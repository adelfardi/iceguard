version: 2
updates:
  # ─── Frontend (npm) ───
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps)"

  # ─── Backend (Maven) ───
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "chore(deps)"

  # ─── GitHub Actions ───
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"

  # ─── Docker images (backend & frontend Dockerfiles) ───
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
