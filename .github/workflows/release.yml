name: Release

# Publishes the backend (Spark) and frontend (nginx) images to GHCR when a
# version tag is pushed, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
#
# Images: ghcr.io/<owner>/iceguard-backend and ghcr.io/<owner>/iceguard-frontend
# The namespace follows the repo owner automatically, so transferring the repo
# to another account needs no workflow change. To publish elsewhere (e.g. a
# dedicated Docker Hub org later), set the IMAGE_NAMESPACE repo variable.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE || format('ghcr.io/{0}', github.repository_owner) }}

jobs:
  publish:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: iceguard-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.spark
          - image: iceguard-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
