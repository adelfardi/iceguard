name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test
        run: mvn -B -ntp package

  frontend:
    name: Frontend (Node / TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The lock file was generated with npm 11; npm 10 (shipped by the node
      # images) reconciles rolldown/vite's wasm optional deps differently and
      # fails `npm ci` ("@emnapi/* missing from lock file"). Match the Dockerfile.
      - name: Pin npm to match the lock file
        run: npm install -g npm@11.6.2
      - name: Install
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
