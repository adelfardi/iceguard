# Local end-to-end test of the *built images* (not Quarkus dev / Vite dev).
# Self-contained stack in its own compose project ("iceguard-images") so it does
# NOT collide with the dev `docker-compose.yml` stack. Only the frontend (8090)
# and the backend Swagger (8091) are published; everything else is internal.
#
#   docker compose -f docker-compose.images.yml up -d --build
#   open http://localhost:8090           # the UI, served by the frontend image
#   open http://localhost:8091/q/swagger-ui   # backend API (optional)
#   docker compose -f docker-compose.images.yml down -v   # tear down + wipe data
#
# To exercise the app: Add Catalog → URI http://rest-catalog:8181 (a working REST
# catalog on MinIO is included), then browse / create namespaces & tables.
#
# Backend here is the SLIM image (backend/Dockerfile, no Spark) — the same scope
# as the snapshot images. Frontend is the nginx image proxying /api to the backend.

name: iceguard-images

services:
  frontend:
    build:
      context: ./frontend
    image: iceguard-frontend:local
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks: [net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile          # slim (no Spark)
    image: iceguard-backend:local-slim
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: iceguard
      QUARKUS_DATASOURCE_PASSWORD: iceguard
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/iceguard
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      QUARKUS_FLYWAY_MIGRATE_AT_START: "false"
      QUARKUS_OIDC_ENABLED: "false"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      # (No Spark in the slim image; the Java API executor is the default. The
      # iceguard.spark.sql-path property keeps its built-in default — it's only
      # used if a Spark maintenance job is explicitly requested, which fails fast.)
    ports:
      - "8091:8080"                    # Swagger / direct API (optional)
    depends_on:
      postgres:
        condition: service_healthy
    networks: [net]

  rest-catalog:
    image: apache/iceberg-rest-fixture:latest
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/rest/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks: [net]

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks: [net]

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/warehouse;
        echo 'Bucket warehouse created';
      "
    networks: [net]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iceguard
      POSTGRES_USER: iceguard
      POSTGRES_PASSWORD: iceguard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceguard"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [net]

volumes:
  minio-data:
  postgres-data:

networks:
  net:
