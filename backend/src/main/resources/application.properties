# Application
quarkus.application.name=iceguard
quarkus.application.version=1.0.0-SNAPSHOT

# HTTP
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=iceguard
quarkus.datasource.password=iceguard
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/iceguard

# Hibernate — Flyway owns the schema; Hibernate only validates it matches the entities.
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=IceGuard API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Apache Iceberg Table Manager API
quarkus.swagger-ui.always-include=true

# OIDC (disabled by default, enable for production)
quarkus.oidc.enabled=false
quarkus.oidc.auth-server-url=http://localhost:8180/realms/iceguard
quarkus.oidc.client-id=iceguard-backend
quarkus.oidc.application-type=service

# Spark executor (rewrite data files)
# The Spark executor launches `spark-sql` as a subprocess. Override the path if Spark
# is not on PATH, e.g. iceguard.spark.sql-path=/opt/spark/bin/spark-sql
iceguard.spark.sql-path=spark-sql
iceguard.spark.iceberg-runtime=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.10.0
iceguard.spark.aws-bundle=org.apache.iceberg:iceberg-aws-bundle:1.10.0
iceguard.spark.catalog-name=ice
iceguard.spark.timeout-seconds=1800
# iceguard.spark.extra-packages=

# Health
quarkus.health.extensions.enabled=true

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.iceguard".level=DEBUG

# Dev profile — uses PostgreSQL from docker-compose (port 5433)
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=iceguard
%dev.quarkus.datasource.password=iceguard
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/iceguard
%dev.quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.oidc.enabled=false

# Test profile
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:iceguard_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.oidc.enabled=false
