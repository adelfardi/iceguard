<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ig-tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfdff"/>
    </linearGradient>
    <linearGradient id="ig-line" x1="14" y1="14" x2="50" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Light tile -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="15.5" fill="url(#ig-tile)" stroke="#cbeef2" stroke-width="1.5"/>

  <!-- Guard shield (thin outline) -->
  <path d="M32 10 L49.5 15.7 V31.5 C49.5 43.3 41.7 50.7 32 54.7 C22.3 50.7 14.5 43.3 14.5 31.5 V15.7 Z"
        fill="#06b6d4" fill-opacity="0.05"
        stroke="url(#ig-line)" stroke-opacity="0.45" stroke-width="1.6"/>

  <!-- Iceberg : above water (light fill + line) -->
  <path d="M32 18 L42 35 H22 Z" fill="#cffafe" fill-opacity="0.55"
        stroke="url(#ig-line)" stroke-width="2" stroke-linejoin="round"/>
  <!-- facet edge -->
  <path d="M32 18 V35" stroke="url(#ig-line)" stroke-opacity="0.5" stroke-width="1.4"/>

  <!-- Iceberg : submerged base (faint) -->
  <path d="M23 35.5 H41 L36.5 46 Q32 49.8 27.5 46 Z"
        fill="#67e8f9" fill-opacity="0.18"
        stroke="url(#ig-line)" stroke-opacity="0.35" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Waterline -->
  <line x1="20.5" y1="35.3" x2="43.5" y2="35.3" stroke="url(#ig-line)" stroke-width="1.6" stroke-linecap="round"/>
</svg>
